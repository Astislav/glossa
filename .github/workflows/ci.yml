name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest
        env:
          GLOSSA_WINDOWS_INTEGRATION: "1"  # runners are disposable — real-registry tests welcome
