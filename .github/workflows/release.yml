name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest
      - run: uv run nexus-kit build
      - name: Smoke-test the frozen exe
        run: |
          Start-Process -FilePath dist\Glossa.exe -WorkingDirectory dist
          Start-Sleep -Seconds 8
          $proc = Get-Process Glossa -ErrorAction SilentlyContinue
          if (-not $proc) { throw "Glossa.exe did not stay alive" }
          if (-not (Test-Path dist\settings\settings.json)) { throw "settings.json was not created" }
          if (-not (Test-Path dist\settings\system_hotkeys_backup.json)) { throw "hotkey backup was not created" }
          Stop-Process -Name Glossa -Force
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/Glossa.exe
